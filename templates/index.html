<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok 分析</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 32px;
            color: #fff;
        }

        .search-section {
            margin-bottom: 32px;
        }

        .search-section label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 8px;
        }

        .search-input {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            padding: 10px 12px;
            color: #e0e0e0;
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: #5a5a5a;
            background: #333;
        }

        .keywords-section {
            margin-bottom: 32px;
        }

        .keywords-section label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 12px;
        }

        .keyword-item {
            padding: 10px 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .keyword-item:hover {
            background: #333;
            border-color: #4a4a4a;
        }

        .buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #5a5a5a;
            color: #fff;
        }

        .btn-primary:hover {
            background: #6a6a6a;
        }

        .btn-secondary {
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
        }

        .btn-secondary:hover {
            background: #333;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 24px;
            border-bottom: 1px solid #2a2a2a;
            background: #0f0f0f;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: #888;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .loading {
            text-align: center;
            padding: 48px 24px;
            color: #888;
        }

        .error {
            background: #3a2a2a;
            border: 1px solid #5a3a3a;
            color: #ff6b6b;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .video-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .video-card:hover {
            border-color: #3a3a3a;
            background: #222;
        }

        .video-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 12px;
            cursor: pointer;
            color: #fff;
            transition: color 0.2s;
        }

        .video-title:hover {
            color: #aaa;
        }

        .video-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
            font-size: 12px;
        }

        .stat {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 4px;
            color: #aaa;
        }

        .stat-label {
            color: #666;
            font-size: 11px;
            margin-bottom: 2px;
        }

        .stat-value {
            color: #e0e0e0;
            font-weight: 500;
        }

        .analysis-btn {
            margin-top: 16px;
            padding: 10px 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            color: #aaa;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .analysis-btn:hover {
            background: #333;
            border-color: #4a4a4a;
            color: #e0e0e0;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            animation: fadeIn 0.2s;
        }

        .modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .export-btn {
            background: none;
            border: 1px solid #3a3a3a;
            color: #aaa;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .export-btn:hover {
            background: #2a2a2a;
            border-color: #4a4a4a;
            color: #e0e0e0;
        }

        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: #e0e0e0;
        }

        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .markdown-content h2 {
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 12px;
            color: #e0e0e0;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 8px;
        }

        .markdown-content h3 {
            font-size: 14px;
            font-weight: 500;
            margin-top: 12px;
            margin-bottom: 8px;
            color: #aaa;
        }

        .markdown-content ul, .markdown-content ol {
            margin-left: 20px;
            margin-bottom: 12px;
        }

        .markdown-content li {
            margin-bottom: 6px;
            line-height: 1.6;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 12px;
        }

        .markdown-content table th, .markdown-content table td {
            border: 1px solid #2a2a2a;
            padding: 8px;
            text-align: left;
        }

        .markdown-content table th {
            background: #2a2a2a;
            font-weight: 600;
        }

        .markdown-content p {
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .source-badge {
            display: inline-block;
            font-size: 11px;
            padding: 4px 8px;
            background: #2a2a2a;
            border-radius: 4px;
            color: #888;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">TikTok 分析</div>

        <nav style="margin-bottom: 24px; display: flex; gap: 8px;">
            <a href="/" style="flex:1; padding: 8px 12px; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 6px; text-align: center; text-decoration: none; color: #e0e0e0; font-size: 13px;">分析</a>
            <a href="/settings" style="flex:1; padding: 8px 12px; background: #333; border: 1px solid #4a4a4a; border-radius: 6px; text-align: center; text-decoration: none; color: #fff; font-size: 13px;">设置</a>
        </nav>

        <div class="search-section">
            <label>搜索</label>
            <input type="text" id="keyword" class="search-input" placeholder="输入关键词..." value="outdoor lighting lamp">
        </div>

        <div class="keywords-section">
            <label>缓存关键词</label>
            <div id="keywords-list"></div>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="analyze()">分析</button>
            <button class="btn btn-secondary" onclick="analyze(true)">刷新</button>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h1>分析结果</h1>
            <p id="header-desc">选择关键词开始分析</p>
        </div>

        <div class="content">
            <div id="error" class="error" style="display:none;"></div>
            <div id="loading" class="loading" style="display:none;">分析中...</div>
            <div id="results"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">AI 深度拆解</h2>
                <div class="modal-actions">
                    <button class="export-btn" onclick="exportToObsidian()">📤 导出到 Obsidian</button>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
            </div>
            <div class="modal-content markdown-content" id="modal-content"></div>
        </div>
    </div>

    <script>
        let currentModalTitle = '';
        let currentModalContent = '';

        function openModal(title, content) {
            currentModalTitle = title;
            currentModalContent = content;
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-content').innerHTML = marked.parse(content);
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        async function exportToObsidian() {
            try {
                const response = await fetch('/api/export-obsidian', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: currentModalTitle,
                        content: currentModalContent
                    })
                });

                const data = await response.json();
                if (data.status === 'success') {
                    alert(`✓ 已导出到 Obsidian\n${data.file_path}`);
                } else {
                    alert(`✗ 导出失败: ${data.message}`);
                }
            } catch (err) {
                alert(`✗ 导出失败: ${err.message}`);
            }
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        async function loadKeywords() {
            try {
                const resp = await fetch('/api/keywords');
                const data = await resp.json();
                const list = document.getElementById('keywords-list');
                if (data.keywords.length > 0) {
                    list.innerHTML = data.keywords.map(k =>
                        `<div class="keyword-item" onclick="setKeyword('${k.keyword}')">${k.keyword}</div>`
                    ).join('');
                }
            } catch (e) {}
        }

        function setKeyword(kw) {
            document.getElementById('keyword').value = kw;
            analyze();
        }

        async function analyze(refresh = false) {
            const keyword = document.getElementById('keyword').value;
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const error = document.getElementById('error');
            const headerDesc = document.getElementById('header-desc');

            loading.style.display = 'block';
            results.innerHTML = '';
            error.style.display = 'none';
            headerDesc.textContent = `正在分析 "${keyword}"...`;

            // 流式显示的中间结果容器
            const streamContainer = document.createElement('div');
            streamContainer.id = 'stream-results';
            results.appendChild(streamContainer);
            const progressInfo = document.createElement('div');
            progressInfo.style.cssText = 'color:#888;font-size:13px;margin-bottom:16px;';
            progressInfo.textContent = '准备中...';
            streamContainer.appendChild(progressInfo);

            let allVideos = [];
            let done = false;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword, refresh })
                });

                // 读取为文本，按 \n 分割，每行单独解析
                const text = await response.text();
                const lines = text.trim().split('\n');

                for (const line of lines) {
                    if (!line.trim()) continue;
                    // 移除可能的 \r 字符
                    const cleanLine = line.replace(/\r/g, '').trim();
                    if (!cleanLine) continue;
                    try {
                        const data = JSON.parse(cleanLine);

                        if (data.status === 'error') {
                            error.textContent = data.message;
                            error.style.display = 'block';
                            headerDesc.textContent = '分析失败';
                            loading.style.display = 'none';
                            return;
                        }

                        if (data.status === 'progress' && !data.done) {
                            // 流式中间结果：追加单个视频卡片
                            progressInfo.textContent = `分析中 (${data.current}/${data.total})...`;
                            const video = data.video;
                            const videoUrl = `https://www.tiktok.com/@${video.author}/video/${video.video_id}`;
                            const vidx = allVideos.length;
                            const analysisId = `analysis-${Date.now()}-${vidx}`;

                            const card = document.createElement('div');
                            card.className = 'video-card';
                            card.innerHTML = `
                                <div class="video-title" onclick="window.open('${videoUrl}', '_blank')">
                                    ${vidx+1}. ${(video.title||'无标题').substring(0, 70)}
                                </div>
                                <div class="video-stats">
                                    <div class="stat"><div class="stat-label">作者</div><div class="stat-value">@${video.author}</div></div>
                                    <div class="stat"><div class="stat-label">赞</div><div class="stat-value">${((video.likes||0)/1000).toFixed(1)}k</div></div>
                                    <div class="stat"><div class="stat-label">评论</div><div class="stat-value">${((video.comments||0)/1000).toFixed(1)}k</div></div>
                                    <div class="stat"><div class="stat-label">分享</div><div class="stat-value">${((video.shares||0)/1000).toFixed(1)}k</div></div>
                                </div>
                                <button class="analysis-btn" onclick="showAnalysis('${analysisId}')">查看 AI 深度拆解</button>
                                <div id="${analysisId}" style="display:none;">${video.ai_analysis||''}</div>
                            `;
                            streamContainer.appendChild(card);
                            allVideos.push(video);
                        } else if (data.done || data.status === 'success') {
                            // 最终结果
                            done = true;
                            headerDesc.textContent = `找到 ${data.total_videos} 个视频`;
                            // 移除临时进度信息
                            if (progressInfo.parentNode) {
                                progressInfo.textContent = `分析完成，共 ${data.total_videos} 个视频`;
                            }
                        }
                    } catch (parseErr) {
                        console.warn('JSON parse error for line:', parseErr, 'Line preview:', cleanLine.substring(0, 100));
                    }
                }

                loading.style.display = 'none';
                if (!done && allVideos.length === 0) {
                    error.textContent = '未收到有效数据，请重试';
                    error.style.display = 'block';
                }
            } catch (err) {
                loading.style.display = 'none';
                error.textContent = '分析失败: ' + err.message;
                error.style.display = 'block';
                headerDesc.textContent = '分析失败';
            }
        }

        function displayResults(videos, source) {
            const results = document.getElementById('results');
            const sourceLabel = source === 'cache' ? '缓存数据' : '实时分析';

            results.innerHTML = `<div class="source-badge">${sourceLabel}</div>` +
                videos.map((v, i) => {
                    const videoUrl = `https://www.tiktok.com/@${v.author}/video/${v.video_id}`;
                    const analysis = v.ai_analysis || '';
                    const analysisId = `analysis-${i}`;

                    return `
                    <div class="video-card">
                        <div class="video-title" onclick="window.open('${videoUrl}', '_blank')">
                            ${i+1}. ${v.title.substring(0, 70)}
                        </div>
                        <div class="video-stats">
                            <div class="stat">
                                <div class="stat-label">作者</div>
                                <div class="stat-value">${v.author}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">赞</div>
                                <div class="stat-value">${(v.likes/1000).toFixed(1)}k</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">评论</div>
                                <div class="stat-value">${(v.comments/1000).toFixed(1)}k</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">分享</div>
                                <div class="stat-value">${(v.shares/1000).toFixed(1)}k</div>
                            </div>
                        </div>
                        <button class="analysis-btn" onclick="showAnalysis('${analysisId}')">
                            查看 AI 深度拆解
                        </button>
                        <div id="${analysisId}" style="display:none;">${analysis}</div>
                    </div>
                `;
                }).join('');
        }

        function showAnalysis(id) {
            const content = document.getElementById(id).textContent;
            openModal('AI 深度拆解', content);
        }

        window.onload = loadKeywords;
    </script>
</body>
</html>
